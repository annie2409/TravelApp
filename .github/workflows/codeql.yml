name: CodeQL (SAST)

# -----------------------------------------------------------------------------
# Static Application Security Testing (SAST) for JS/TS across the monorepo.
#   - Runs on every PR (security-events write required).
#   - Runs on push to main (baseline).
#   - Runs weekly so newly published queries catch latent issues.
# Findings appear in the repo's "Security → Code scanning" tab.
# See /CI_CD.md §Security for the rationale.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'   # Mondays 06:23 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level least privilege; the analyze job escalates as needed.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the security-extended pack for higher coverage (slower).
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
