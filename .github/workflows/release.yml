name: Release

# -----------------------------------------------------------------------------
# Tag-driven immutable image release.
#
# Triggered ONLY by pushing a `v*.*.*` tag from this repo's main branch.
# Forks cannot trigger this workflow (the `push` event does not run from
# forks). The publish job verifies the tagged commit is on main before
# publishing — this enforces immutability and prevents accidental
# publishing of untested commits.
#
# Image tags produced (per service):
#   ghcr.io/<owner>/<repo>/<service>:<semver>   e.g. v1.2.3
#   ghcr.io/<owner>/<repo>/<service>:<sha>      e.g. abc1234…
# The image *digest* is printed in logs for audit/provenance (and can be
# scraped into job outputs later if we split the matrix into per-service jobs).
#
# IMMUTABILITY RULE: tags are NEVER moved. To re-publish, bump the patch.
# -----------------------------------------------------------------------------

on:
  push:
    tags:
      - 'v*.*.*'

# Workflow-level least privilege; jobs may request more explicitly.
permissions:
  contents: read

concurrency:
  # Serial: never run two releases of the same tag concurrently.
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-tag-on-main:
    name: Verify tag points to a commit on main
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to check ancestry
      - name: Ensure tag commit is an ancestor of origin/main
        run: |
          git fetch origin main --depth=0
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not on main. Refusing to publish."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} verified on main."

  publish:
    name: Build & publish ${{ matrix.service }} ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: verify-tag-on-main
    permissions:
      contents: read
      packages: write   # required to push to GHCR
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    # NOTE: Job outputs cannot be set per-matrix key. If you need digests
    # as machine-readable outputs, split publish into two jobs (publish-backend
    # and publish-frontend). For now, we print the digest in logs.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: |
          echo "Service: ${{ matrix.service }}"
          echo "Tag    : ${{ github.ref_name }}"
          echo "SHA    : ${{ github.sha }}"
          echo "Digest : ${{ steps.build.outputs.digest }}"
